<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Vayne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:    #ffffff;
      --ink:   #111111;
      --muted: #777777;
      --line:  #e5e5e5;
      --hover: #f7f7f7;
      --mono:  'IBM Plex Mono', monospace;
      --sans:  'IBM Plex Sans', sans-serif;
    }
    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-weight: 300;
      max-width: 660px;
      margin: 0 auto;
      padding: 64px 24px 96px;
      line-height: 1.7;
    }

    /* profile */
    .profile { display: flex; align-items: center; gap: 22px; margin-bottom: 40px; }
    .avatar { width: 68px; height: 68px; border-radius: 50%; border: 1px solid var(--line); flex-shrink: 0; }
    .profile-name { font-family: var(--mono); font-size: 1.2rem; font-weight: 500; letter-spacing: -.02em; }
    .profile-bio { color: var(--muted); font-size: .88rem; margin-top: 3px; }
    .profile-meta { display: flex; flex-wrap: wrap; gap: 12px; font-size: .78rem; color: var(--muted); margin-top: 8px; }
    .contact-link { display: inline-flex; align-items: center; gap: 5px; color: var(--muted); text-decoration: none; }
    .contact-link:hover { color: var(--ink); }
    .contact-link svg { width: 12px; height: 12px; flex-shrink: 0; }

    /* divider */
    hr { border: none; border-top: 1px solid var(--line); margin: 32px 0; }

    /* sections */
    section { margin-bottom: 32px; }
    h2 {
      font-family: var(--mono);
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* skills */
    .skills { list-style: none; display: flex; flex-wrap: wrap; gap: 7px; }
    .skills li {
      font-family: var(--mono);
      font-size: .76rem;
      padding: 3px 9px;
      border: 1px solid var(--line);
      border-radius: 3px;
    }

    /* cards */
    .cards { display: grid; gap: 8px; }
    .card {
      display: block; padding: 13px 15px;
      border: 1px solid var(--line); border-radius: 6px;
      text-decoration: none; color: inherit;
      transition: background .15s;
    }
    .card:hover { background: var(--hover); }
    .card-top { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }
    .card-name { font-family: var(--mono); font-size: .83rem; font-weight: 500; }
    .card-desc { font-size: .82rem; color: var(--muted); }
    .card-lang { display: inline-flex; align-items: center; gap: 5px; font-size: .74rem; color: var(--muted); margin-top: 8px; }
    .card-lang i { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

    /* stats */
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stats img { width: 100%; display: block; border: 1px solid var(--line); border-radius: 6px; }

    /* footer */
    footer { font-size: .73rem; color: var(--muted); text-align: center; margin-top: 56px; }
    footer a { color: var(--muted); text-decoration: none; }

    @media (max-width: 480px) {
      .profile { flex-direction: column; align-items: flex-start; gap: 12px; }
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="profile">
    <img class="avatar"
      src="https://github.com/rqaefaqa.png" alt="Vayne"
      onerror="this.src='https://github.githubassets.com/images/gravatars/gravatar-user-420.png'">
    <div>
      <div class="profile-name">Vayne</div>
      <div class="profile-bio">Backend Developer · Building reliable systems</div>
      <div class="profile-meta">
        <span>📍 Beijing, China</span>
        
        <a href="https://github.com/rqaefaqa" target="_blank" rel="noopener" class="contact-link">

          @rqaefaqa

      </div>
    </div>
  </div>

  <hr>

  <section>
    <h2>Skills</h2>
    <ul class="skills"><li>Java</li><li>Spring Boot</li><li>React</li><li>MySQL</li><li>Redis</li><li>Docker</li></ul>

    <h2>Stats</h2>
    <div class="stats">
      <img src="https://github-readme-stats.vercel.app/api?username=rqaefaqa&show_icons=true&theme=default&hide_border=false&bg_color=ffffff&title_color=111&text_color=666&icon_color=333&count_private=true" alt="GitHub Stats">

    <a href="https://github.com/rqaefaqa" target="_blank">github.com/rqaefaqa</a>

</body>
</html>
